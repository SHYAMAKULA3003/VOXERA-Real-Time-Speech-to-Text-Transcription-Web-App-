<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voxera — Speech to Text</title>

  <!-- PDF & Image -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <h1>Voxera</h1>
  <p class="tagline">Speak once. Capture forever.</p>
  <p id="status">Tap Start to begin</p>

  <div class="mic-wrapper">
    <div class="pulse"></div>
    <button id="startBtn">🎤 Start</button>
    <button id="stopBtn">⛔ Stop</button>
  </div>

  <div class="output" id="capture">
    <p id="transcript">Your speech will appear here...</p>
  </div>

  <div class="actions">
    <button id="pdfBtn">📄 Download PDF</button>
    <button id="imgBtn">🖼️ Download Image</button>
    <button id="copyBtn">📋 Copy</button>
    <button id="clearBtn">🧹 Clear</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
